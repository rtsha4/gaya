<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <rect class="ghost-shadow" x="60" y="170" width="80" height="4" fill="black" fill-opacity="0.2" />

  <!-- Shovel layer -->
  <g class="shovel-group">
    <rect x="0" y="0" width="4" height="60" fill="#78350f" />
    <rect x="-4" y="-4" width="12" height="4" fill="#78350f" />
    <path d="M-8,55 H12 V65 L8,75 H-4 L-8,65 Z" fill="#94a3b8" stroke="#475569" stroke-width="1" />
  </g>

  <g class="body-group">
    <!-- Stubby Body Path -->
    <path class="body-main" d="M64,95 H136 V160 H132 V164 H124 V160 H120 V164 H112 V160 H104 V164 H96 V160 H88 V164 H80 V160 H72 V164 H68 V160 H64 Z" fill="#e2e8f0" stroke="#1e293b" stroke-width="4" />
    
    <g class="face">
      <g class="eyes-normal">
        <rect x="80" y="124" width="8" height="12" fill="#1e293b" />
        <rect x="112" y="124" width="8" height="12" fill="#1e293b" />
      </g>
      <g class="eyes-error" opacity="0">
        <rect x="76" y="120" width="4" height="4" fill="#1e293b" />
        <rect x="84" y="128" width="4" height="4" fill="#1e293b" />
        <rect x="112" y="120" width="4" height="4" fill="#1e293b" />
        <rect x="120" y="128" width="4" height="4" fill="#1e293b" />
      </g>
    </g>
    <rect x="94" y="145" width="12" height="4" fill="#1e293b" fill-opacity="0.5" />
  </g>

  <!-- Thought Bubble Decoration -->
  <g class="deco-think" transform="translate(155, 50)" opacity="0">
    <rect x="-20" y="15" width="4" height="4" fill="#6366f1" />
    <rect x="-12" y="8" width="6" height="6" fill="#6366f1" />
    <rect x="0" y="0" width="28" height="24" fill="#6366f1" stroke="white" stroke-width="2" />
    <text x="14" y="18" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold" font-size="16">?</text>
  </g>

  <!-- Star Decoration -->
  <g class="deco-star" transform="translate(155, 60)" opacity="0">
    <rect x="6" y="0" width="6" height="6" fill="#fbbf24" />
    <rect x="0" y="6" width="18" height="6" fill="#fbbf24" />
    <rect x="6" y="12" width="6" height="6" fill="#fbbf24" />
  </g>
</svg>
